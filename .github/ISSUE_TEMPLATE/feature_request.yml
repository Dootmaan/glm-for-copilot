name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you want to solve, not
        only the solution you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is getting in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you have thought about.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is about the extension itself, not GLM API/billing (which is handled by Z.ai).
          required: true
